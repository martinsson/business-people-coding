<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestion locative</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="overlay" class="overlay"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon"><i data-lucide="building-2"></i></div>
        <span class="brand-name">Gestion locative</span>
      </div>

      <nav class="sidebar-nav">
        <p class="nav-section-label">Navigation</p>
        <a class="nav-item" data-view="dashboard">
          <i data-lucide="layout-dashboard"></i><span>Tableau de bord</span>
        </a>
        <a class="nav-item" data-view="apartments">
          <i data-lucide="building-2"></i><span>Appartements</span>
        </a>
        <a class="nav-item" data-view="tenants">
          <i data-lucide="users"></i><span>Locataires</span>
        </a>
        <a class="nav-item" data-view="leases">
          <i data-lucide="key-round"></i><span>Locations</span>
        </a>
        <a class="nav-item" data-view="payments">
          <i data-lucide="receipt"></i><span>Loyers</span>
        </a>
        <a class="nav-item" data-view="charges">
          <i data-lucide="wrench"></i><span>Charges</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <p class="nav-section-label">Données</p>
        <button id="export-btn" class="sidebar-action">
          <i data-lucide="download"></i><span>Exporter JSON</span>
        </button>
        <button id="import-btn" class="sidebar-action">
          <i data-lucide="upload"></i><span>Importer JSON</span>
        </button>
        <input id="import-file" type="file" accept="application/json" hidden />
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <button id="menu-toggle" class="menu-toggle" aria-label="Ouvrir le menu">
          <i data-lucide="menu"></i>
        </button>
        <h1 id="page-title">Tableau de bord</h1>
      </header>
      <main id="app" class="content"></main>
    </div>
  </div>

  <!-- ── Templates ─────────────────────────────────────── -->

  <template id="tpl-dashboard">
    <section class="view">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon c-blue"><i data-lucide="building-2"></i></div>
          <div class="stat-body">
            <span class="stat-label">Appartements</span>
            <span class="stat-value" data-stat="apartments">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon c-violet"><i data-lucide="users"></i></div>
          <div class="stat-body">
            <span class="stat-label">Locataires</span>
            <span class="stat-value" data-stat="tenants">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon c-emerald"><i data-lucide="key-round"></i></div>
          <div class="stat-body">
            <span class="stat-label">Locations actives</span>
            <span class="stat-value" data-stat="activeLeases">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon c-sky"><i data-lucide="trending-up"></i></div>
          <div class="stat-body">
            <span class="stat-label">Loyers mensuels</span>
            <span class="stat-value" data-stat="monthlyRent">0 €</span>
          </div>
        </div>
        <div class="stat-card warn">
          <div class="stat-icon c-amber"><i data-lucide="alert-circle"></i></div>
          <div class="stat-body">
            <span class="stat-label">Impayés</span>
            <span class="stat-value" data-stat="unpaid">0 €</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon c-orange"><i data-lucide="wrench"></i></div>
          <div class="stat-body">
            <span class="stat-label">Charges (12 mois)</span>
            <span class="stat-value" data-stat="yearCharges">0 €</span>
          </div>
        </div>
      </div>

      <div class="panel-row">
        <div class="panel">
          <div class="panel-header">
            <i data-lucide="key-round"></i><h3>Locations actives</h3>
          </div>
          <div class="table-wrap">
            <table data-list="active-leases">
              <thead><tr><th>Appartement</th><th>Locataire</th><th>Début</th><th>Loyer</th><th>Charges</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <i data-lucide="receipt"></i><h3>Derniers paiements</h3>
          </div>
          <div class="table-wrap">
            <table data-list="recent-payments">
              <thead><tr><th>Date</th><th>Location</th><th>Montant</th><th>Statut</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-apartments">
    <section class="view">
      <div class="view-header">
        <div class="view-title"><i data-lucide="building-2"></i><h2>Appartements</h2></div>
        <button class="btn-primary" data-action="add"><i data-lucide="plus"></i>Nouvel appartement</button>
      </div>
      <div class="table-wrap card">
        <table data-list="apartments">
          <thead><tr><th>Nom</th><th>Adresse</th><th>Surface</th><th>Pièces</th><th>Notes</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="tpl-tenants">
    <section class="view">
      <div class="view-header">
        <div class="view-title"><i data-lucide="users"></i><h2>Locataires</h2></div>
        <button class="btn-primary" data-action="add"><i data-lucide="plus"></i>Nouveau locataire</button>
      </div>
      <div class="table-wrap card">
        <table data-list="tenants">
          <thead><tr><th>Nom</th><th>Prénom</th><th>Email</th><th>Téléphone</th><th>Notes</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="tpl-leases">
    <section class="view">
      <div class="view-header">
        <div class="view-title"><i data-lucide="key-round"></i><h2>Locations</h2></div>
        <button class="btn-primary" data-action="add"><i data-lucide="plus"></i>Nouvelle location</button>
      </div>
      <div class="table-wrap card">
        <table data-list="leases">
          <thead><tr><th>Appartement</th><th>Locataire</th><th>Début</th><th>Fin</th><th>Loyer</th><th>Charges</th><th>Dépôt</th><th>Statut</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="tpl-payments">
    <section class="view">
      <div class="view-header">
        <div class="view-title"><i data-lucide="receipt"></i><h2>Loyers et paiements</h2></div>
        <div class="btn-group">
          <button class="btn-secondary" data-action="generate"><i data-lucide="calendar-plus"></i>Générer le mois</button>
          <button class="btn-primary" data-action="add"><i data-lucide="plus"></i>Nouveau paiement</button>
        </div>
      </div>
      <div class="filters card">
        <label>Location
          <select data-filter="lease"><option value="">Toutes les locations</option></select>
        </label>
        <label>Statut
          <select data-filter="status">
            <option value="">Tous les statuts</option>
            <option value="paid">Payé</option>
            <option value="pending">En attente</option>
          </select>
        </label>
      </div>
      <div class="table-wrap card">
        <table data-list="payments">
          <thead><tr><th>Date</th><th>Location</th><th>Type</th><th>Montant</th><th>Statut</th><th>Note</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="tpl-charges">
    <section class="view">
      <div class="view-header">
        <div class="view-title"><i data-lucide="wrench"></i><h2>Charges</h2></div>
        <button class="btn-primary" data-action="add"><i data-lucide="plus"></i>Nouvelle charge</button>
      </div>
      <div class="filters card">
        <label>Appartement
          <select data-filter="apartment"><option value="">Tous les appartements</option></select>
        </label>
      </div>
      <div class="table-wrap card">
        <table data-list="charges">
          <thead><tr><th>Date</th><th>Appartement</th><th>Catégorie</th><th>Libellé</th><th>Montant</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </template>

  <!-- ── Modal ──────────────────────────────────────────── -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <header class="modal-header">
        <h3 id="modal-title">Modifier</h3>
        <button class="btn-icon" id="modal-close" aria-label="Fermer"><i data-lucide="x"></i></button>
      </header>
      <form id="modal-form"></form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
