<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ServiceDesk Workspace</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="workspace">

  <!-- ── Global Header ──────────────────────────────────── -->
  <header class="now-header">
    <button class="header-hamburger" id="nav-toggle-btn" aria-label="Toggle navigation">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <a class="header-brand" href="#">
      <div class="brand-logo">SD</div>
      <span class="brand-name">ServiceDesk</span>
    </a>

    <div class="global-search">
      <svg class="global-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Rechercher dans ServiceDesk…" id="header-search"/>
    </div>

    <div class="header-right">
      <button class="header-icon-btn" id="btn-notif" title="Notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-badge" id="notif-badge" style="display:none"></span>
      </button>
      <button class="header-icon-btn" id="btn-alerts" title="Alertes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m10.29 3.86-7 12A1 1 0 0 0 4 17.5h16a1 1 0 0 0 .87-1.5l-7-12a1 1 0 0 0-1.74 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span class="notif-badge" id="alert-badge" style="display:none;background:#e07b00"></span>
      </button>
      <button class="header-icon-btn" title="Paramètres">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="header-avatar" title="Administrateur">AD</div>
    </div>
  </header>

  <div class="workspace-body">

    <!-- ── App Navigator ──────────────────────────────────── -->
    <nav class="app-nav" id="app-nav">
      <div class="nav-section-title">Applications</div>

      <button class="nav-module active" data-module="dashboard" title="Tableau de bord">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nav-module-label">Tableau de bord</span>
      </button>

      <div class="nav-section-title">Gestion du travail</div>

      <button class="nav-module" data-module="tasks" title="Tâches">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span class="nav-module-label">Tâches</span>
        <span class="nav-module-badge" id="nav-badge-tasks" style="display:none">0</span>
      </button>

      <button class="nav-module" data-module="notifications" title="Notifications">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="nav-module-label">Notifications</span>
        <span class="nav-module-badge" id="nav-badge-notifs" style="display:none">0</span>
      </button>

      <button class="nav-module" data-module="alerts" title="Alertes">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m10.29 3.86-7 12A1 1 0 0 0 4 17.5h16a1 1 0 0 0 .87-1.5l-7-12a1 1 0 0 0-1.74 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span class="nav-module-label">Alertes</span>
        <span class="nav-module-badge danger" id="nav-badge-alerts" style="display:none">0</span>
      </button>

      <button class="nav-toggle" id="nav-expand-btn" title="Réduire">
        <svg width="15" height="15" id="nav-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </nav>

    <!-- ── Workspace Main ─────────────────────────────────── -->
    <div class="workspace-main">

      <!-- Tab strip -->
      <div class="tab-strip" id="tab-strip"></div>

      <!-- Content -->
      <div class="workspace-content" id="workspace-content"></div>

    </div>
  </div>
</div>

<!-- ── Modal ──────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <div class="modal-hd">
      <span class="modal-hd-title" id="modal-title">Formulaire</span>
      <button class="btn-icon" id="modal-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-bd" id="modal-body"></div>
    <div class="modal-ft" id="modal-footer"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
