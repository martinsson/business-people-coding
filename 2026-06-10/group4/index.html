<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello World</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
    }
    .card {
      background: var(--card);
      padding: 2.5rem 3rem;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
      max-width: 90vw;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 2.5rem;
    }
    .wave { display: inline-block; animation: wave 1.8s ease-in-out infinite; transform-origin: 70% 70%; }
    @keyframes wave {
      0%, 60%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(14deg); }
      20% { transform: rotate(-8deg); }
      30% { transform: rotate(14deg); }
      40% { transform: rotate(-4deg); }
      50% { transform: rotate(10deg); }
    }
    p { color: var(--muted); margin: 0 0 1.5rem; }
    .row { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
    input {
      background: #0f172a;
      color: var(--text);
      border: 1px solid #334155;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      border-radius: 8px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      background: var(--accent);
      color: #0f172a;
      border: none;
      padding: 0.7rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
    }
    button:hover { filter: brightness(1.1); }
    button:active { transform: scale(0.96); }
    button.ghost { background: transparent; color: var(--muted); padding: 0.4rem 0.8rem; font-weight: 400; font-size: 0.9rem; }
    button.ghost:hover { color: var(--text); filter: none; }
    #greeting { margin-top: 1.25rem; font-size: 1.1rem; min-height: 1.5rem; color: var(--accent); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1 id="title">Hello, world! <span class="wave">👋</span></h1>

    <!-- Vue saisie du prénom -->
    <section id="login-view">
      <p>Entrez votre prénom pour commencer.</p>
      <div class="row">
        <input id="name-input" type="text" placeholder="Votre prénom" autocomplete="given-name" maxlength="40">
        <button id="save-btn">Valider</button>
      </div>
    </section>

    <!-- Vue utilisateur "connecté" -->
    <section id="welcome-view" class="hidden">
      <p>Bienvenue sur votre première appli web.</p>
      <button id="greet-btn">Dis bonjour</button>
      <div id="greeting"></div>
      <div style="margin-top:1.25rem">
        <button id="logout-btn" class="ghost">Changer de prénom</button>
      </div>
    </section>

    <p style="margin-top:1.5rem"><a href="recensement.html" style="color:var(--accent)">Recensement de la population &rarr;</a></p>
  </main>

  <script>
    const STORAGE_KEY = "helloworld:firstName";

    const title = document.getElementById("title");
    const loginView = document.getElementById("login-view");
    const welcomeView = document.getElementById("welcome-view");
    const nameInput = document.getElementById("name-input");
    const saveBtn = document.getElementById("save-btn");
    const greetBtn = document.getElementById("greet-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const out = document.getElementById("greeting");

    const greetings = [
      (n) => `Bonjour, ${n} ! 🇫🇷`,
      (n) => `Hello, ${n}! 🇬🇧`,
      (n) => `Hola, ${n}! 🇪🇸`,
      (n) => `Ciao, ${n}! 🇮🇹`,
      (n) => `Hallo, ${n}! 🇩🇪`,
      (n) => `こんにちは, ${n}! 🇯🇵`,
    ];

    let currentName = "";
    let i = 0;

    function showWelcome(name) {
      currentName = name;
      title.innerHTML = `Bonjour, ${name} ! <span class="wave">👋</span>`;
      loginView.classList.add("hidden");
      welcomeView.classList.remove("hidden");
      out.textContent = "";
      i = 0;
    }

    function showLogin() {
      currentName = "";
      title.innerHTML = `Hello, world! <span class="wave">👋</span>`;
      welcomeView.classList.add("hidden");
      loginView.classList.remove("hidden");
      nameInput.value = "";
      nameInput.focus();
    }

    function saveName() {
      const name = nameInput.value.trim();
      if (!name) {
        nameInput.focus();
        return;
      }
      localStorage.setItem(STORAGE_KEY, name);
      showWelcome(name);
    }

    saveBtn.addEventListener("click", saveName);
    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") saveName();
    });

    greetBtn.addEventListener("click", () => {
      out.textContent = greetings[i % greetings.length](currentName);
      i++;
    });

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      showLogin();
    });

    // Au chargement : restaure le prénom mémorisé s'il existe
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      showWelcome(stored);
    } else {
      nameInput.focus();
    }
  </script>
</body>
</html>
