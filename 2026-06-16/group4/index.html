<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSYVAGO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      text-align: center;
      padding: 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    header h1 {
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #a78bfa;
    }

    header p {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    #chat {
      margin-top: 90px;
      margin-bottom: 80px;
      width: 100%;
      max-width: 640px;
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .bubble.psyvago {
      background: #2d2b55;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      color: #d4b8ff;
    }

    .bubble.patient {
      background: #0f3460;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
      color: #e0e0e0;
    }

    .bubble.result {
      background: #1b3a2d;
      border: 1px solid #34d399;
      border-radius: 16px;
      align-self: flex-start;
      color: #a7f3d0;
      max-width: 90%;
    }

    .bubble.result strong {
      color: #34d399;
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .bubble.result p {
      margin-top: 4px;
      font-size: 0.9rem;
      color: #d1fae5;
    }

    #input-area {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #16213e;
      border-top: 1px solid #0f3460;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    #input-area input {
      flex: 1;
      max-width: 580px;
      padding: 10px 16px;
      border-radius: 24px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
    }

    #input-area input:focus {
      border-color: #a78bfa;
    }

    #input-area button {
      padding: 10px 20px;
      border-radius: 24px;
      border: none;
      background: #a78bfa;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
    }

    #input-area button:hover { background: #c4b5fd; }
    #input-area button:disabled { background: #555; cursor: default; }
  </style>
</head>
<body>

  <header>
    <h1>PSYVAGO</h1>
    <p>Votre espace d'écoute</p>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <input id="msg" type="text" placeholder="Exprimez-vous librement…" autocomplete="off" />
    <button id="send-btn" onclick="send()">Envoyer</button>
  </div>

  <script>
    const questions = [
      "Bonjour, je suis PSYVAGO. Je suis là pour vous écouter sans jugement. Quel est le problème principal qui vous préoccupe en ce moment ?",
      "Est-ce que cela impacte votre quotidien — sommeil, travail, relations — et depuis combien de temps ?",
      "Avez-vous déjà vécu des épisodes similaires, ou est-ce la première fois ?"
    ];

    // Profils détectés par mots-clés → code spécialité Annuaire Santé
    const profils = [
      {
        label: "Psychiatre",
        specialite: "SM54",
        profession: "10",  // Médecin
        mots_cles: ["dépression", "déprimé", "bipolaire", "psychose", "hallucination", "médicament", "traitement", "grave", "sévère", "suicide", "mourir", "crise", "hospitali"]
      },
      {
        label: "Psychologue",
        specialite: null,
        profession: "93",  // Psychologue
        mots_cles: ["anxieux", "anxiété", "angoisse", "phobie", "trauma", "deuil", "peur", "stress", "émotions", "pleur", "triste", "insomnie", "cauchemar", "obsession", "toc", "addiction", "rumination", "couple", "famille", "conflit", "travail", "burn-out", "burnout", "épuisement"]
      }
    ];

    const CP_GRENOBLE = ["38000", "38100"];

    let step = 0;
    const reponses = [];

    function addBubble(text, who) {
      const chat = document.getElementById('chat');
      const b = document.createElement('div');
      b.className = 'bubble ' + who;
      b.textContent = text;
      chat.appendChild(b);
      chat.scrollTop = chat.scrollHeight;
    }

    function addResult(nom, specialite, adresse, telephone) {
      const chat = document.getElementById('chat');
      const b = document.createElement('div');
      b.className = 'bubble result';
      b.innerHTML = `
        <strong>Praticien recommandé à Grenoble</strong>
        <p><b>${nom}</b></p>
        <p>🏥 ${specialite}</p>
        ${adresse ? `<p>📍 ${adresse}</p>` : ''}
        ${telephone ? `<p>📞 ${telephone}</p>` : ''}
      `;
      chat.appendChild(b);
      chat.scrollTop = chat.scrollHeight;
    }

    function addResultsGroup(resultats, label) {
      const chat = document.getElementById('chat');
      const b = document.createElement('div');
      b.className = 'bubble result';
      let html = `<strong>Praticiens "${label}" à Grenoble</strong>`;
      for (const r of resultats) {
        html += `<hr style="border-color:#2d5a3d;margin:8px 0">
          <p><b>${r.nom}</b></p>
          ${r.specialite ? `<p>🏥 ${r.specialite}</p>` : ''}
          ${r.adresse ? `<p>📍 ${r.adresse}</p>` : ''}
          ${r.telephone ? `<p>📞 ${r.telephone}</p>` : ''}`;
      }
      b.innerHTML = html;
      chat.appendChild(b);
      chat.scrollTop = chat.scrollHeight;
    }

    function detecterProfil() {
      const texte = reponses.join(' ').toLowerCase();
      let meilleur = profils[1];
      let maxScore = -1;
      for (const p of profils) {
        const score = p.mots_cles.filter(m => texte.includes(m)).length;
        if (score > maxScore) { maxScore = score; meilleur = p; }
      }
      return meilleur;
    }


async function chercherPraticiens(profil) {
      // Psychiatres → dataset "medecins" (Assurance Maladie, médecins libéraux)
      // Psychologues → dataset "annuaire-des-professionnels-de-sante" (tous professions)
      const dataset = profil.label === 'Psychiatre'
        ? 'medecins'
        : 'annuaire-des-professionnels-de-sante';
      const base = `https://public.opendatasoft.com/api/explore/v2.1/catalog/datasets/${dataset}/records`;

      const cpField = profil.label === 'Psychiatre' ? 'cp_cabinet' : 'cp_lib';
      const cpFilter = CP_GRENOBLE.map(c => `${cpField}="${c}"`).join(' OR ');
      const profField = profil.label === 'Psychiatre' ? 'libelle_profession' : 'profession_lib';
      const where = encodeURIComponent(`(${cpFilter}) AND ${profField}="${profil.label}"`);
      const url = `${base}?where=${where}&limit=3`;

      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      // Log console pour vérifier les vrais noms de champs (F12 dans le navigateur)
      if (data.results?.[0]) {
        console.log('[PSYVAGO] champs reçus :', Object.keys(data.results[0]));
        console.log('[PSYVAGO] premier résultat :', data.results[0]);
      }

      return (data.results || []).map(r => {
        if (profil.label === 'Psychiatre') {
          return {
            nom: [r.civilite, r.prenom_exercice, r.nom_exercice].filter(Boolean).join(' '),
            specialite: r.libelle_savoir_faire || r.libelle_profession || profil.label,
            adresse: [r.adresse_cabinet, r.cp_cabinet, r.libelle_commune].filter(Boolean).join(', '),
            telephone: r.telephone || ''
          };
        } else {
          return {
            nom: [r.civilite_lib, r.prenom_lib, r.nom_lib].filter(Boolean).join(' '),
            specialite: r.profession_lib || profil.label,
            adresse: [r.adr_voie_lib, r.cp_lib, r.com_lib].filter(Boolean).join(', '),
            telephone: r.tel_lib || ''
          };
        }
      }).filter(r => r.nom);
    }

    async function orienter() {
      const profil = detecterProfil();
      addBubble("Merci pour ces informations. Je recherche des praticiens disponibles à Grenoble…", 'psyvago');

      try {
        const resultats = await chercherPraticiens(profil);
        if (resultats.length === 0) throw new Error('Aucun résultat');
        addResultsGroup(resultats, profil.label);
      } catch (e) {
        addBubble("Je n'ai pas pu contacter l'annuaire de santé. Voici une orientation générale : consultez le site annuaire.sante.fr en filtrant sur Grenoble (38000) et la spécialité \"" + profil.label + "\".", 'psyvago');
      }
    }

    function send() {
      const input = document.getElementById('msg');
      const text = input.value.trim();
      if (!text) return;

      addBubble(text, 'patient');
      reponses.push(text);
      input.value = '';

      if (step < questions.length) {
        setTimeout(() => {
          addBubble(questions[step], 'psyvago');
          step++;
        }, 600);
      } else {
        document.getElementById('send-btn').disabled = true;
        input.disabled = true;
        input.placeholder = "Consultation terminée";
        setTimeout(() => orienter(), 700);
      }
    }

    document.getElementById('msg').addEventListener('keydown', e => {
      if (e.key === 'Enter') send();
    });

    setTimeout(() => {
      addBubble(questions[step], 'psyvago');
      step++;
    }, 400);
  </script>

</body>
</html>
