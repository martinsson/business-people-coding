<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PantryChef — Recipes from what you have</title>
<style>
  :root {
    --bg: #fff7f0;
    --card: #ffffff;
    --ink: #2b2b2b;
    --muted: #8a8a8a;
    --accent: #ff7a45;
    --good: #2bb673;
    --line: #eee2d8;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  header { text-align: center; padding: 28px 16px 6px; }
  header h1 { margin: 0; font-size: 1.9rem; }
  header h1 .c { color: var(--accent); }
  header p { margin: 6px 0 0; color: var(--muted); }
  .wrap { max-width: 860px; margin: 0 auto; padding: 12px 16px 60px; }

  .section-title { font-size: 1.05rem; margin: 22px 4px 10px; display: flex; align-items: center; gap: 8px; }
  .section-title .step { background: var(--accent); color: #fff; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; font-size: .85rem; }

  /* Ingredient picker grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
    gap: 10px;
  }
  .tile {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 6px 10px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: transform .06s ease, border-color .15s ease, box-shadow .15s ease;
    position: relative;
  }
  .tile:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.06); }
  .tile .emoji { font-size: 2rem; line-height: 1; display: block; }
  .tile .name { font-size: .8rem; margin-top: 6px; color: var(--ink); text-transform: capitalize; }
  .tile.selected { border-color: var(--good); background: #f1fbf6; }
  .tile.selected .check {
    position: absolute; top: 6px; right: 6px;
    background: var(--good); color: #fff; border-radius: 50%;
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: .8rem;
  }

  .bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    margin: 18px 4px 6px;
  }
  .bar .spacer { flex: 1; }
  .count { color: var(--muted); font-size: .9rem; }
  label.toggle { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-size: .9rem; cursor: pointer; }
  button.clear {
    background: none; border: 1px solid var(--line); color: var(--muted);
    border-radius: 999px; padding: 7px 14px; cursor: pointer; font-size: .85rem;
  }
  button.clear:hover { color: var(--ink); border-color: var(--muted); }

  /* Recipe cards */
  .recipes { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 620px) { .recipes { grid-template-columns: 1fr 1fr; } }
  .recipe {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px;
  }
  .recipe.makeable { border-color: var(--good); box-shadow: 0 6px 18px rgba(43,182,115,.12); }
  .recipe h3 { margin: 0 0 2px; font-size: 1.1rem; }
  .recipe .meta { color: var(--muted); font-size: .82rem; margin-bottom: 10px; }
  .badge { display:inline-block; font-size: .72rem; background: #eafaf2; color: var(--good); border: 1px solid #bfe9d4; border-radius: 999px; padding: 2px 8px; vertical-align: middle; margin-left: 6px; }
  .progress { height: 7px; background: #f0e8e1; border-radius: 999px; overflow: hidden; margin: 6px 0; }
  .progress > span { display:block; height:100%; background: linear-gradient(90deg, var(--accent), var(--good)); }
  .ings { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .ings .pill {
    font-size: 1.15rem; line-height: 1; padding: 5px; border-radius: 10px;
    background: #faf5f1; filter: grayscale(1); opacity: .45;
    position: relative; cursor: default;
  }
  .ings .pill.have { filter: none; opacity: 1; background: #eafaf2; }
  .match { font-size: .82rem; color: var(--muted); }
  .match b { color: var(--ink); }
  details { margin-top: 6px; }
  summary { cursor: pointer; color: var(--accent); font-size: .9rem; }
  .steps { margin: 8px 0 0; padding-left: 18px; font-size: .9rem; line-height: 1.5; }
  .empty { text-align: center; color: var(--muted); padding: 36px 10px; grid-column: 1 / -1; }
  footer { text-align: center; color: var(--muted); font-size: .78rem; padding: 16px; }

  /* Invent button + generated card */
  button.invent {
    background: linear-gradient(90deg, var(--accent), #ff5db1); color: #fff; font-weight: 700;
    border: none; border-radius: 999px; padding: 8px 16px; cursor: pointer; font-size: .9rem;
  }
  button.invent:hover { filter: brightness(1.05); }
  .invented {
    border: 2px solid transparent !important;
    background:
      linear-gradient(var(--card), var(--card)) padding-box,
      linear-gradient(90deg, var(--accent), #ff5db1) border-box;
    margin-bottom: 14px;
  }
  .invented .tagline { font-size: .8rem; color: var(--accent); font-weight: 600; }
  .invented .disclaimer { font-size: .76rem; color: var(--muted); margin-top: 8px; }
  .reinvent {
    background: #fff; border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 12px; cursor: pointer; font-size: .82rem; color: var(--ink);
  }
  .reinvent:hover { border-color: var(--accent); color: var(--accent); }
  .invent-head { display: flex; align-items: center; gap: 12px; margin: 4px 4px 10px; font-weight: 700; color: var(--accent); }
  .invent-head span { flex: 1; }
  .invent-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 620px) { .invent-grid { grid-template-columns: 1fr 1fr 1fr; } }
  .invent-grid .tagline { font-size: .72rem; }

  /* Photo scan */
  .scan {
    background: var(--card); border: 2px dashed var(--line); border-radius: var(--radius);
    padding: 14px; margin-bottom: 14px; display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
  }
  .scan .upload {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    background: var(--accent); color: #fff; font-weight: 600;
    border-radius: 999px; padding: 10px 16px; font-size: .92rem;
  }
  .scan .upload:hover { filter: brightness(1.05); }
  .scan .info { color: var(--muted); font-size: .82rem; flex: 1; min-width: 160px; }
  #preview { display: none; width: 64px; height: 64px; object-fit: cover; border-radius: 10px; border: 1px solid var(--line); }
  #scan-status { font-size: .85rem; color: var(--ink); margin: 0 4px 6px; min-height: 1.1em; }
  #scan-status .ok { color: var(--good); }
  #scan-status .warn { color: var(--accent); }

  /* Manual text input */
  .type-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .type-row input {
    flex: 1; font-size: 1rem; padding: 11px 14px;
    border: 2px solid var(--line); border-radius: 999px; outline: none; color: var(--ink); background: var(--card);
  }
  .type-row input:focus { border-color: var(--accent); }
  .type-row button {
    border: none; cursor: pointer; background: var(--accent); color: #fff; font-weight: 600;
    border-radius: 999px; padding: 0 18px; font-size: .95rem;
  }
  .type-row button:hover { filter: brightness(1.05); }
</style>
</head>
<body>
  <header>
    <h1>🍳 Pantry<span class="c">Chef</span></h1>
    <p>Tap what you have at home — see what you can cook.</p>
  </header>

  <div class="wrap">
    <div class="section-title"><span class="step">1</span> Pick your ingredients</div>

    <div class="scan">
      <label class="upload">
        📷 Scan a photo
        <input type="file" id="photo" accept="image/*" capture="environment" hidden />
      </label>
      <img id="preview" alt="your photo" />
      <span class="info">Upload or snap a photo of your ingredients — we'll auto-select what we recognize. Then tap to confirm or correct.</span>
    </div>
    <div id="scan-status"></div>

    <div class="type-row">
      <input id="type-input" type="text" list="ing-list" placeholder="Or type an ingredient and press Enter…" autocomplete="off" />
      <datalist id="ing-list"></datalist>
      <button id="type-add">Add</button>
    </div>

    <div id="grid" class="grid"></div>

    <div class="bar">
      <div class="section-title" style="margin:0;"><span class="step">2</span> Your recipes</div>
      <span id="count" class="count"></span>
      <span class="spacer"></span>
      <select id="level" class="clear" title="Filter by skill level"></select>
      <select id="cuisine" class="clear" title="Filter by cuisine"></select>
      <label class="toggle"><input type="checkbox" id="only-makeable" /> Only what I can make</label>
      <button class="invent" id="invent">✨ Invent a recipe</button>
      <button class="clear" id="clear">Clear</button>
    </div>
    <div id="invented"></div>
    <div id="recipes" class="recipes"></div>
  </div>

  <footer>Works fully offline · built-in recipe library</footer>

<script>
// Each ingredient has a picture (emoji) so the UI stays visual and simple.
const ING = {
  eggs: "🥚", butter: "🧈", salt: "🧂", pepper: "🌶️", cheese: "🧀",
  pasta: "🍝", tomato: "🍅", garlic: "🧄", "olive oil": "🫒", oil: "🫗",
  basil: "🌿", rice: "🍚", onion: "🧅", carrot: "🥕", "soy sauce": "🍶",
  bread: "🍞", flour: "🌾", milk: "🥛", sugar: "🍬", broccoli: "🥦",
  "bell pepper": "🫑", avocado: "🥑", lime: "🍋", cilantro: "🌿",
  mozzarella: "🧀", chicken: "🍗", celery: "🥬", banana: "🍌", honey: "🍯",
  yogurt: "🥣", chickpeas: "🫘", lemon: "🍋", tortilla: "🫓", lettuce: "🥬",
  chili: "🌶️", beans: "🫘", ginger: "🫚", cumin: "🥄", "curry powder": "🍛",
  "coconut milk": "🥥", noodles: "🍜", "sesame oil": "🫗", scallion: "🧅",
  cucumber: "🥒", feta: "🧀", potato: "🥔", spinach: "🥬", bacon: "🥓",
  lobster: "🦞", shrimp: "🦐", parsley: "🌿", fish: "🐟",

const emoji = (i) => ING[i] || "🥄";

// Cuisines with a flag/icon for a friendly cultural label.
const CUISINE_EMOJI = {
  Italian: "🇮🇹", Mexican: "🇲🇽", Chinese: "🇨🇳", Indian: "🇮🇳", Japanese: "🇯🇵",
  Thai: "🇹🇭", French: "🇫🇷", Greek: "🇬🇷", "Middle Eastern": "🥙", American: "🇺🇸",
  British: "🇬🇧", Korean: "🇰🇷", Spanish: "🇪🇸", Mediterranean: "🫒", Comfort: "🍲", Healthy: "🥗",
};
const cuisineTag = (c) => `${CUISINE_EMOJI[c] || "🍽️"} ${c}`;

// Cook skill level per recipe (defaults to Intermediate if unlisted).
const LEVEL = {
  "Grilled Cheese": "Beginner", "Yogurt Bowl": "Beginner", "Banana Smoothie": "Beginner",
  "Eggs on Toast": "Beginner", "Tamago Gohan": "Beginner", "Garlic Butter Rice": "Beginner",
  "Green Salad": "Beginner", "Caprese Salad": "Beginner", "Guacamole": "Beginner",
  "Pizza Toast": "Beginner", "Hummus": "Beginner", "Greek Salad": "Beginner", "BLT Sandwich": "Beginner",
  "Classic Omelette": "Intermediate", "Tomato Pasta": "Intermediate", "Fried Rice": "Intermediate",
  "Pancakes": "Intermediate", "Veggie Stir-Fry": "Intermediate", "Tomato & Egg": "Intermediate",
  "Veggie Quesadilla": "Intermediate", "Spaghetti Aglio e Olio": "Intermediate", "Bean Tacos": "Intermediate",
  "Garlic Soy Noodles": "Intermediate", "Shakshuka": "Intermediate", "Ratatouille": "Intermediate",
  "Bibimbap Bowl": "Intermediate", "Gambas al Ajillo": "Intermediate", "Shrimp Fried Rice": "Intermediate",
  "Garlic Butter Lobster": "Intermediate",
  "Chicken Soup": "Advanced", "Chana Masala": "Advanced", "Thai Coconut Curry": "Advanced",
  "Spanish Tortilla": "Advanced", "Lobster Pasta": "Advanced",
};
const LEVEL_EMOJI = { Beginner: "🟢", Intermediate: "🟡", Advanced: "🔴" };
const LEVEL_ORDER = ["Beginner", "Intermediate", "Advanced"];
const levelOf = (r) => LEVEL[r.name] || "Intermediate";
const levelTag = (l) => `${LEVEL_EMOJI[l] || "⚪"} ${l}`;

const RECIPES = [
  { name: "Classic Omelette", cuisine: "French", time: "10 min", serves: 1,
    ingredients: ["eggs", "butter", "salt", "pepper", "cheese"],
    steps: ["Beat eggs with salt and pepper.", "Melt butter in a pan over medium heat.", "Pour in eggs, swirl, and let set.", "Add cheese, fold, and serve."] },
  { name: "Tomato Pasta", cuisine: "Italian", time: "20 min", serves: 2,
    ingredients: ["pasta", "tomato", "garlic", "olive oil", "salt", "basil"],
    steps: ["Boil pasta in salted water until al dente.", "Sauté garlic in olive oil.", "Add chopped tomato and simmer 10 min.", "Toss with pasta and fresh basil."] },
  { name: "Fried Rice", cuisine: "Chinese", time: "15 min", serves: 2,
    ingredients: ["rice", "eggs", "onion", "carrot", "soy sauce", "garlic", "oil"],
    steps: ["Scramble eggs and set aside.", "Fry onion, carrot and garlic in oil.", "Add cooked rice and soy sauce.", "Stir in eggs and serve hot."] },
  { name: "Grilled Cheese", cuisine: "American", time: "8 min", serves: 1,
    ingredients: ["bread", "cheese", "butter"],
    steps: ["Butter the outside of two bread slices.", "Place cheese between them.", "Grill in a pan until golden both sides."] },
  { name: "Pancakes", cuisine: "American", time: "20 min", serves: 3,
    ingredients: ["flour", "eggs", "milk", "sugar", "butter", "salt"],
    steps: ["Whisk flour, sugar and salt.", "Add eggs and milk; mix to a batter.", "Cook ladles of batter in buttered pan.", "Flip when bubbles form."] },
  { name: "Veggie Stir-Fry", cuisine: "Chinese", time: "15 min", serves: 2,
    ingredients: ["broccoli", "carrot", "bell pepper", "garlic", "soy sauce", "oil"],
    steps: ["Heat oil in a wok.", "Add garlic, then the vegetables.", "Stir-fry on high heat 5–6 min.", "Splash soy sauce and serve."] },
  { name: "Guacamole", cuisine: "Mexican", time: "10 min", serves: 4,
    ingredients: ["avocado", "lime", "onion", "tomato", "salt", "cilantro"],

    ingredients: ["tomato", "mozzarella", "basil", "olive oil", "salt"],
    steps: ["Slice tomato and mozzarella.", "Layer with basil leaves.", "Drizzle olive oil, season with salt."] },
  { name: "Chicken Soup", cuisine: "Comfort", time: "40 min", serves: 4,
    ingredients: ["chicken", "carrot", "onion", "celery", "salt", "pepper", "garlic"],

  { name: "Garlic Butter Rice", cuisine: "Comfort", time: "20 min", serves: 2,
    ingredients: ["rice", "garlic", "butter", "salt"],
    steps: ["Cook rice until fluffy.", "Sauté garlic in butter.", "Toss rice through garlic butter and salt."] },
  { name: "Tomato & Egg", cuisine: "Chinese", time: "12 min", serves: 2,
    ingredients: ["eggs", "tomato", "salt", "sugar", "oil", "onion"],
    steps: ["Scramble eggs lightly and set aside.", "Cook onion and tomato with a little sugar.", "Return eggs, season and combine."] },
  { name: "Hummus", cuisine: "Middle Eastern", time: "10 min", serves: 4,
    ingredients: ["chickpeas", "garlic", "lemon", "olive oil", "salt"],
    steps: ["Blend chickpeas with garlic and lemon.", "Add olive oil until smooth.", "Season with salt to taste."] },
  { name: "Pizza Toast", cuisine: "Italian", time: "12 min", serves: 2,
    ingredients: ["bread", "tomato", "mozzarella", "basil", "olive oil"],
    steps: ["Top bread with sliced tomato and mozzarella.", "Bake until cheese melts.", "Finish with basil and olive oil."] },
  { name: "Veggie Quesadilla", cuisine: "Mexican", time: "12 min", serves: 2,
    ingredients: ["tortilla", "cheese", "bell pepper", "onion", "oil"],
    steps: ["Sauté pepper and onion in oil.", "Fill tortilla with cheese and veggies.", "Toast in a dry pan until crisp; slice."] },
  { name: "Yogurt Bowl", cuisine: "Healthy", time: "5 min", serves: 1,
    ingredients: ["yogurt", "honey", "banana"],
    steps: ["Spoon yogurt into a bowl.", "Top with sliced banana.", "Drizzle with honey."] },
  { name: "Green Salad", cuisine: "Mediterranean", time: "8 min", serves: 2,
    ingredients: ["lettuce", "tomato", "onion", "olive oil", "lemon", "salt"],
    steps: ["Tear lettuce; add chopped tomato and onion.", "Whisk olive oil, lemon and salt.", "Toss together and serve."] },

  // --- More cultural options ---
  { name: "Spaghetti Aglio e Olio", cuisine: "Italian", time: "15 min", serves: 2,

    ingredients: ["tortilla", "beans", "tomato", "onion", "cilantro", "lime", "cheese"],

  // --- Seafood ---
  { name: "Garlic Butter Lobster", cuisine: "American", time: "20 min", serves: 2,
    ingredients: ["lobster", "butter", "garlic", "lemon", "parsley", "salt"],

  { name: "Lobster Pasta", cuisine: "Italian", time: "25 min", serves: 2,
    ingredients: ["lobster", "pasta", "tomato", "garlic", "olive oil", "chili"],

  { name: "Gambas al Ajillo", cuisine: "Spanish", time: "12 min", serves: 2,
    ingredients: ["shrimp", "garlic", "olive oil", "chili", "lemon", "parsley"],
    steps: ["Warm olive oil with sliced garlic and chili.", "Add shrimp and cook until pink.", "Squeeze in lemon and scatter parsley.", "Serve sizzling with bread."] },
  { name: "Shrimp Fried Rice", cuisine: "Chinese", time: "15 min", serves: 2,
    ingredients: ["shrimp", "rice", "eggs", "garlic", "soy sauce", "scallion", "oil"],

// Pantry staples — if these are the only thing missing, the recipe still counts as makeable.
const STAPLES = new Set(["salt", "pepper", "oil", "olive oil", "butter", "sugar"]);

// All ingredients used, sorted with most-common first for a friendly picker order.
const POPULAR = ["eggs", "tomato", "cheese", "rice", "pasta", "bread", "onion", "garlic", "milk", "chicken", "banana", "carrot"];
const ALL = (() => {
  const set = new Set();
  RECIPES.forEach(r => r.ingredients.forEach(i => set.add(i)));
  const rest = Array.from(set).filter(i => !POPULAR.includes(i)).sort();
  return POPULAR.filter(p => set.has(p)).concat(rest);
})();

const have = new Set();
const gridEl = document.getElementById("grid");
const recipesEl = document.getElementById("recipes");
const countEl = document.getElementById("count");
const onlyEl = document.getElementById("only-makeable");
const cuisineEl = document.getElementById("cuisine");
const levelEl = document.getElementById("level");

// Populate the cuisine and skill-level filters.
(function buildFilters() {
  const cuisines = Array.from(new Set(RECIPES.map(r => r.cuisine))).sort();
  cuisineEl.innerHTML = '<option value="">🌍 All cuisines</option>' +
    cuisines.map(c => `<option value="${c}">${cuisineTag(c)}</option>`).join("");
  cuisineEl.addEventListener("change", render);

  const levels = LEVEL_ORDER.filter(l => RECIPES.some(r => levelOf(r) === l));
  levelEl.innerHTML = '<option value="">👩‍🍳 Any skill level</option>' +
    levels.map(l => `<option value="${l}">${levelTag(l)}</option>`).join("");
  levelEl.addEventListener("change", render);
})();

// Ingredients shown as tiles — starts with the recipe set, grows as users type custom ones.
const tiles = ALL.slice();

function makeTile(ing) {
  const t = document.createElement("div");
  t.className = "tile" + (have.has(ing) ? " selected" : "");
  t.dataset.ing = ing;
  t.innerHTML = `<span class="check">✓</span><span class="emoji">${emoji(ing)}</span><span class="name">${ing}</span>`;
  t.onclick = () => {
    if (have.has(ing)) have.delete(ing); else have.add(ing);
    t.classList.toggle("selected", have.has(ing));
    render();
  };
  return t;
}

function buildGrid() {
  gridEl.innerHTML = "";
  tiles.forEach(ing => gridEl.appendChild(makeTile(ing)));
}

// Normalize typed text to match known ingredients (handles plurals/case/spacing).
function normalizeTyped(raw) {
  const t = raw.trim().toLowerCase().replace(/\s+/g, " ");
  if (!t) return null;
  if (tiles.includes(t)) return t;
  const singular = t.replace(/s$/, "");
  const hit = tiles.find(i => i === t || i === singular || i.replace(/s$/, "") === singular);
  return hit || t; // fall back to the custom text
}

// Add an ingredient by name: select its tile, creating one if it's new.
function addByName(raw) {
  const ing = normalizeTyped(raw);
  if (!ing) return;
  have.add(ing);
  if (!tiles.includes(ing)) {
    tiles.push(ing);
    gridEl.appendChild(makeTile(ing));
    refreshDatalist();
  } else {
    const tile = gridEl.querySelector(`.tile[data-ing="${CSS.escape(ing)}"]`);
    if (tile) tile.classList.add("selected");
  }
  render();
}

function refreshDatalist() {
  const dl = document.getElementById("ing-list");
  dl.innerHTML = tiles.map(i => `<option value="${i}"></option>`).join("");
}

const typeInput = document.getElementById("type-input");
function commitTyped() {
  const v = typeInput.value;
  if (v.trim()) { addByName(v); typeInput.value = ""; }
  typeInput.focus();
}
document.getElementById("type-add").onclick = commitTyped;
typeInput.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); commitTyped(); } });

function score(r) {
  const got = r.ingredients.filter(i => have.has(i));
  const missing = r.ingredients.filter(i => !have.has(i));
  const missingCore = missing.filter(i => !STAPLES.has(i));
  const pct = Math.round((got.length / r.ingredients.length) * 100);
  return { got, missing, missingCore, pct, makeable: missing.length === 0, coreMakeable: missingCore.length === 0 };
}

// ---- Invent an original recipe from ONLY the selected ingredients ----
const CATS = {
  protein: ["eggs", "chicken", "beef", "bacon", "shrimp", "lobster", "fish", "tofu", "chickpeas", "beans"],
  base: ["rice", "pasta", "noodles", "bread", "tortilla", "potato"],
  aromatic: ["garlic", "onion", "scallion", "ginger", "chili"],
  veg: ["tomato", "carrot", "broccoli", "bell pepper", "celery", "cucumber", "lettuce", "spinach", "avocado", "mushroom", "corn"],
  dairy: ["cheese", "mozzarella", "feta", "milk", "yogurt"],
  herb: ["basil", "cilantro", "parsley", "mint"],
  acid: ["lemon", "lime"],
  fat: ["olive oil", "oil", "sesame oil", "butter"],
  spice: ["cumin", "curry powder", "pepper"],
  sweet: ["banana", "honey", "sugar"],
  liquid: ["coconut milk", "soy sauce"],
};
const ADJ = ["Rustic", "Zesty", "Golden", "Smoky", "Garden", "Speedy", "Cozy", "Fusion", "Wild", "Hearty", "Bright", "Sunset"];
const cap = (s) => s.replace(/\b\w/g, c => c.toUpperCase());
const jl = (a) => a.length <= 1 ? (a[0] || "") : a.slice(0, -1).join(", ") + " and " + a[a.length - 1];

let inventActive = false;
let inventSeed = 0;

function buildCtx(seed) {
  const ings = Array.from(have);
  if (!ings.length) return null;
  const g = {};
  for (const k in CATS) g[k] = ings.filter(i => CATS[k].includes(i));
  const fat = g.fat[0] || "a splash of oil";
  const season = `Season to taste${g.spice.length ? " with " + jl(g.spice) : ""} (and a pinch of salt).`;
  const finish = (g.herb.length || g.acid.length) ? `Finish with ${jl([...g.acid, ...g.herb])}.` : null;
  const hotProtein = g.protein.filter(p => !["chickpeas", "beans"].includes(p));
  const rawUnsafe = g.protein.filter(p => ["chicken", "beef", "shrimp", "lobster", "fish", "bacon"].includes(p));
  const mainList = g.protein.concat(g.base, g.veg).slice(0, 2);
  const nameMain = (mainList.length ? mainList : ings.slice(0, 2)).map(cap).join(" & ");
  return { ings, g, fat, season, finish, hotProtein, rawUnsafe, nameMain, adj: ADJ[seed % ADJ.length] };
}

// Each style is a totally different cooking APPROACH (bucket), so options feel dramatically distinct.
const STYLES = [
  { id: "stirfry", bucket: "sear", ok: c => c.g.veg.length || c.hotProtein.length || c.g.base.length,
    make: c => { const b = c.g.base.find(x => ["rice", "noodles", "pasta"].includes(x));
      return { name: `${c.adj} ${c.nameMain} Stir-Fry`, dish: "🔥 High-heat stir-fry", time: 18, steps: [
        b ? `Cook the ${b} and set aside.` : null,
        c.g.aromatic.length ? `Blast ${jl(c.g.aromatic)} in ${c.fat} over high heat.` : `Get ${c.fat} smoking hot in a wok.`,
        c.hotProtein.length ? `Sear ${jl(c.hotProtein)} until just cooked.` : null,
        c.g.veg.length ? `Throw in ${jl(c.g.veg)} and toss hard for 3–4 min.` : null,
        c.g.liquid.length ? `Splash in ${jl(c.g.liquid)}.` : "Add a splash of water to steam briefly.",
        b ? `Fold the ${b} back through.` : null, c.finish, c.season] }; } },

  { id: "soup", bucket: "simmer", ok: c => c.g.veg.length || c.g.protein.length,
    make: c => { const b = c.g.base.find(x => ["rice", "pasta", "noodles"].includes(x));
      return { name: `${c.adj} ${c.nameMain} Soup`, dish: "🥣 Slow-simmered soup", time: 35, steps: [
        c.g.aromatic.length ? `Soften ${jl(c.g.aromatic)} in ${c.fat}.` : `Warm ${c.fat} in a pot.`,
        c.hotProtein.length ? `Add ${jl(c.hotProtein)} and brown lightly.` : null,
        `Pour in ${c.g.liquid.includes("coconut milk") ? "the coconut milk plus water" : "water or stock"} to cover.`,
        c.g.veg.length ? `Add ${jl(c.g.veg)} and simmer 20 min until tender.` : "Simmer gently for 15 min.",
        b ? `Drop in the ${b} to cook in the broth.` : null, c.finish, c.season] }; } },

  { id: "salad", bucket: "fresh", ok: c => (c.g.veg.length || c.g.sweet.length) && c.rawUnsafe.length === 0,
    make: c => ({ name: `${c.adj} ${c.nameMain} Salad`, dish: "🥗 No-cook fresh salad", time: 10, steps: [
      `Chop ${jl([...c.g.veg, ...c.g.sweet])} and pile into a bowl.`,
      (c.g.protein.length || c.g.dairy.length) ? `Add ${jl([...c.g.protein, ...c.g.dairy])}.` : null,
      `Dress with ${jl([...(c.g.fat.length ? [c.g.fat[0]] : ["a drizzle of oil"]), ...c.g.acid])}${c.g.acid.length ? "" : " (a splash of citrus or vinegar brightens it, if you have some)"}.`,
      c.finish, c.season, "Toss just before serving."] }) },

  { id: "roast", bucket: "bake", ok: c => c.g.veg.length || c.hotProtein.length || c.g.base.includes("potato"),
    make: c => ({ name: `${c.adj} Roasted ${c.nameMain}`, dish: "🔆 Oven roast", time: 35, steps: [
      "Heat the oven to 220°C / 425°F.",
      `Toss ${jl([...c.hotProtein, ...c.g.veg, ...(c.g.base.includes("potato") ? ["potato"] : [])])} with ${c.fat}${c.g.spice.length ? " and " + jl(c.g.spice) : ""}.`,
      "Spread on a tray in a single layer.",
      "Roast 25–30 min, turning once, until caramelised at the edges.",
      c.g.dairy.length ? `Scatter ${jl(c.g.dairy)} over for the last 5 min.` : null, c.finish, c.season] }) },

  { id: "fritters", bucket: "sear", ok: c => c.g.veg.length && (c.ings.includes("eggs") || c.ings.includes("flour") || c.g.base.includes("potato") || c.g.protein.includes("chickpeas")),
    make: c => ({ name: `${c.adj} ${c.nameMain} Fritters`, dish: "🥔 Pan-fried fritters", time: 22, steps: [
      `Grate or finely chop ${jl(c.g.veg)}${c.g.base.includes("potato") ? " and the potato" : ""}.`,
      `Mix with ${c.ings.includes("eggs") ? "beaten egg" : c.ings.includes("flour") ? "a little flour and water" : "mashed chickpeas"} to bind${c.g.spice.length ? ", plus " + jl(c.g.spice) : ""}.`,
      "Shape into small patties.",
      `Pan-fry in ${c.fat} until golden and crisp on both sides.`,
      c.g.dairy.length ? `Serve with ${jl(c.g.dairy)}.` : null, c.finish] }) },

  { id: "curry", bucket: "simmer", ok: c => (c.g.spice.length || c.g.liquid.includes("coconut milk")) && (c.g.protein.length || c.g.veg.length),
    make: c => ({ name: `${c.adj} ${c.nameMain} Curry`, dish: "🍛 Spiced curry", time: 30, steps: [
      c.g.aromatic.length ? `Fry ${jl(c.g.aromatic)} in ${c.fat}.` : `Warm ${c.fat} in a pan.`,
      c.g.spice.length ? `Toast ${jl(c.g.spice)} for a minute.` : null,
      c.hotProtein.length ? `Add ${jl(c.hotProtein)} and seal.` : null,
      `Pour in ${c.g.liquid.includes("coconut milk") ? "the coconut milk" : "a splash of water"} and simmer.`,
      c.g.veg.length ? `Add ${jl(c.g.veg)} and cook until tender.` : null,
      c.g.base.includes("rice") ? "Serve over rice." : null, c.finish, c.season] }) },

  { id: "pasta", bucket: "boil", ok: c => c.g.base.some(b => b === "pasta" || b === "noodles"),
    make: c => { const b = c.g.base.find(x => x === "pasta" || x === "noodles");
      return { name: `${c.adj} ${c.nameMain} ${b === "noodles" ? "Noodles" : "Pasta"}`, dish: "🍝 One-pan " + b, time: 20, steps: [
        `Boil the ${b} until al dente, then drain.`,
        c.g.aromatic.length ? `Sizzle ${jl(c.g.aromatic)} in ${c.fat}.` : `Warm ${c.fat}.`,
        c.hotProtein.length ? `Add ${jl(c.hotProtein)} and cook.` : null,
        c.g.veg.length ? `Add ${jl(c.g.veg)} and soften.` : null,
        `Toss the ${b} through${c.g.liquid.length ? " with " + jl(c.g.liquid) : ""}.`,
        c.g.dairy.length ? `Stir in ${jl(c.g.dairy)}.` : null, c.finish, c.season] }; } },

  { id: "wrap", bucket: "assemble", ok: c => c.g.base.includes("bread") || c.g.base.includes("tortilla"),
    make: c => { const b = c.g.base.includes("tortilla") ? "tortilla" : "bread";
      return { name: `${c.adj} ${c.nameMain} ${b === "tortilla" ? "Wrap" : "Melt"}`, dish: b === "tortilla" ? "🌯 Rolled wrap" : "🥪 Toasted melt", time: 12, steps: [
        (c.hotProtein.length || c.g.veg.length || c.g.aromatic.length) ? `Sauté ${jl([...c.g.aromatic, ...c.hotProtein, ...c.g.veg])} in ${c.fat}.` : `Warm your fillings in ${c.fat}.`,
        b === "bread" ? "Toast the bread." : "Warm the tortilla in a dry pan.",
        `Layer on the fillings${c.g.dairy.length ? " with " + jl(c.g.dairy) : ""}.`, c.finish,
        b === "tortilla" ? "Roll up, toast seam-side down, and slice." : "Top with a second slice and griddle until golden."] }; } },

  { id: "frittata", bucket: "bake", ok: c => c.ings.includes("eggs"),
    make: c => ({ name: `${c.adj} ${c.nameMain} Frittata`, dish: "🍳 Baked egg skillet", time: 18, steps: [
      "Beat the eggs.",
      (c.g.aromatic.length || c.g.veg.length) ? `Soften ${jl([...c.g.aromatic, ...c.g.veg])} in ${c.fat}.` : `Heat ${c.fat} in an oven-safe pan.`,
      c.hotProtein.filter(p => p !== "eggs").length ? `Add ${jl(c.hotProtein.filter(p => p !== "eggs"))}.` : null,
      `Pour the eggs over${c.g.dairy.length ? " and dot with " + jl(c.g.dairy) : ""}; cook low until set, then finish under a grill.`,
      c.finish, c.season] }) },

  { id: "smoothie", bucket: "blend", ok: c => c.g.sweet.length && (c.ings.includes("milk") || c.ings.includes("yogurt")) && c.rawUnsafe.length === 0 && !c.g.aromatic.length,
    make: c => ({ name: `${c.adj} ${c.nameMain} Smoothie`, dish: "🥤 Blended drink", time: 5, steps: [
      `Add ${jl(c.ings)} to a blender.`,
      "Blend until smooth, loosening with water if needed.",
      "Taste, adjust, and serve chilled."] }) },
];

// Pick up to `n` options that are as different as possible (different buckets first).
function inventMany(seed, n = 3) {
  const base = buildCtx(seed);
  if (!base) return [];
  let pool = STYLES.filter(s => s.ok(base));
  if (!pool.length) return [];
  const off = seed % pool.length;
  pool = pool.slice(off).concat(pool.slice(0, off));
  const chosen = [], buckets = new Set();
  for (const s of pool) { if (chosen.length >= n) break; if (!buckets.has(s.bucket)) { chosen.push(s); buckets.add(s.bucket); } }
  for (const s of pool) { if (chosen.length >= n) break; if (!chosen.includes(s)) chosen.push(s); }
  return chosen.map((s, i) => {
    const c = buildCtx(seed + i * 4); // different adjective per option
    const r = s.make(c);
    return { ...r, steps: r.steps.filter(Boolean), ingredients: c.ings, style: s.id };
  });
}

function renderInvented() {
  const box = document.getElementById("invented");
  if (!inventActive || have.size === 0) { box.innerHTML = ""; return; }
  const options = inventMany(inventSeed, 3);
  if (!options.length) { box.innerHTML = ""; return; }
  const card = (r) => {
    const pills = r.ingredients.map(i => `<span class="pill have" title="${i}">${emoji(i)}</span>`).join("");
    return `
      <div class="recipe invented">
        <div class="tagline">✨ Idea</div>
        <h3>${r.name}</h3>
        <div class="meta">${r.dish} · ⏱ ~${r.time} min · uses ${r.ingredients.length} ingredients</div>
        <div class="ings">${pills}</div>
        <ol class="steps">${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
      </div>`;
  };
  box.innerHTML = `
    <div class="invent-head">
      <span>✨ ${options.length} very different idea${options.length > 1 ? "s" : ""} from your ingredients</span>
      <button class="reinvent">🎲 Reinvent</button>
    </div>
    <div class="invent-grid">${options.map(card).join("")}</div>
    <div class="disclaimer">Auto-generated ideas — trust your taste and judgement.</div>`;
  box.querySelector(".reinvent").onclick = () => { inventSeed++; renderInvented(); };
}

function render() {
  recipesEl.innerHTML = "";
  renderInvented();
  if (have.size === 0) {
    recipesEl.innerHTML = '<div class="empty">Tap a few ingredients above to see what you can cook. ✨</div>';
    countEl.textContent = "";
    return;
  }

  let list = RECIPES.map(r => ({ r, s: score(r) })).filter(x => x.s.got.length > 0);
  if (cuisineEl.value) list = list.filter(x => x.r.cuisine === cuisineEl.value);
  if (levelEl.value) list = list.filter(x => levelOf(x.r) === levelEl.value);
  if (onlyEl.checked) list = list.filter(x => x.s.coreMakeable);
  list.sort((a, b) => b.s.pct - a.s.pct || a.s.missing.length - b.s.missing.length);

  countEl.textContent = list.length ? `${list.length} found` : "";
  if (list.length === 0) {
    const usedByAny = new Set();
    RECIPES.forEach(r => r.ingredients.forEach(i => usedByAny.add(i)));
    const unknown = Array.from(have).filter(i => !usedByAny.has(i));
    let msg;
    if (cuisineEl.value || levelEl.value) {
      const f = [cuisineEl.value && cuisineTag(cuisineEl.value), levelEl.value && levelTag(levelEl.value)].filter(Boolean).join(" + ");
      msg = `No <b>${f}</b> recipe matches your ingredients yet — try clearing the filters or adding more.`;
    } else if (unknown.length) {
      msg = `We don't have a recipe using <b>${unknown.map(i => `${emoji(i)} ${i}`).join(", ")}</b> yet. Try adding a few more common ingredients alongside it.`;
    } else {
      msg = "Nothing matches yet — add a few more ingredients.";
    }
    recipesEl.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  list.forEach(({ r, s }) => {
    const card = document.createElement("div");
    card.className = "recipe" + (s.coreMakeable ? " makeable" : "");
    const pills = r.ingredients.map(i =>
      `<span class="pill ${have.has(i) ? "have" : ""}" title="${i}${have.has(i) ? "" : " (missing)"}">${emoji(i)}</span>`
    ).join("");
    const badge = s.coreMakeable
      ? `<span class="badge">${s.makeable ? "Ready to cook" : "Just need staples"}</span>` : "";
    card.innerHTML = `
      <h3>${r.name}${badge}</h3>
      <div class="meta">${cuisineTag(r.cuisine)} · ${levelTag(levelOf(r))} · ⏱ ${r.time} · serves ${r.serves}</div>
      <div class="progress"><span style="width:${s.pct}%"></span></div>
      <div class="match">You have <b>${s.got.length}/${r.ingredients.length}</b></div>
      <div class="ings">${pills}</div>
      <details><summary>Show recipe</summary><ol class="steps">${r.steps.map(st => `<li>${st}</li>`).join("")}</ol></details>
    `;
    recipesEl.appendChild(card);
  });
}

document.getElementById("clear").onclick = () => {
  have.clear();
  document.querySelectorAll(".tile.selected").forEach(t => t.classList.remove("selected"));
  render();
};
onlyEl.addEventListener("change", render);

document.getElementById("invent").onclick = () => {
  if (have.size === 0) {
    document.getElementById("invented").innerHTML =
      '<div class="empty">Pick some ingredients first, then I\'ll invent a recipe. ✨</div>';
    return;
  }
  inventActive = true;
  inventSeed++;
  renderInvented();
  document.getElementById("invented").scrollIntoView({ behavior: "smooth", block: "nearest" });
};

// ---- Photo scanning (in-browser, no backend) ----
// Maps labels from a general image model to ingredients in our list.
const RECOGNIZE = [
  { k: ["banana"], ing: "banana" },
  { k: ["lemon"], ing: "lemon" },
  { k: ["lime"], ing: "lime" },
  { k: ["bell pepper", "capsicum"], ing: "bell pepper" },
  { k: ["broccoli"], ing: "broccoli" },
  { k: ["cauliflower"], ing: "broccoli" },
  { k: ["cabbage", "lettuce"], ing: "lettuce" },
  { k: ["cucumber", "zucchini"], ing: "celery" },
  { k: ["carbonara", "spaghetti", "noodle"], ing: "pasta" },
  { k: ["loaf", "bagel", "pretzel", "baguette", "bun"], ing: "bread" },
  { k: ["mushroom"], ing: "onion" },
  { k: ["orange", "mandarin"], ing: "lemon" },
  { k: ["egg", "omelet"], ing: "eggs" },
  { k: ["mashed potato", "potato"], ing: "rice" },
  { k: ["cheeseburger", "cheese"], ing: "cheese" },
];

const photoEl = document.getElementById("photo");
const previewEl = document.getElementById("preview");
const statusEl = document.getElementById("scan-status");
const setStatus = (html) => { statusEl.innerHTML = html; };

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src; s.onload = resolve;
    s.onerror = () => reject(new Error("Could not load " + src));
    document.head.appendChild(s);
  });
}

let modelPromise = null;
async function getModel() {
  if (!modelPromise) {
    setStatus("⏳ Loading the recognizer (first time only)…");
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js");
    await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js");
    modelPromise = mobilenet.load();
  }
  return modelPromise;
}

function selectTile(ing) {
  have.add(ing);
  const tile = gridEl.querySelector(`.tile[data-ing="${CSS.escape(ing)}"]`);
  if (tile) tile.classList.add("selected");
}

function handlePredictions(preds) {
  const matched = new Set();
  const seenLabels = [];
  preds.forEach(p => {
    const label = p.className.toLowerCase();
    seenLabels.push(p.className.split(",")[0]);
    if (p.probability < 0.08) return;
    for (const rule of RECOGNIZE) {
      if (rule.k.some(k => label.includes(k))) { matched.add(rule.ing); break; }
    }
  });
  if (matched.size > 0) {
    matched.forEach(selectTile);
    render();
    const list = Array.from(matched).map(i => `${emoji(i)} ${i}`).join(", ");
    setStatus(`<span class="ok">✓ Added: ${list}.</span> Tap any tile to confirm or correct.`);
  } else {
    setStatus(`<span class="warn">Couldn't confidently match an ingredient</span> (I saw: ${seenLabels.slice(0,3).join(", ")}). Tap the tiles below instead.`);
  }
}

photoEl.addEventListener("change", async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  previewEl.src = URL.createObjectURL(file);
  previewEl.style.display = "block";
  try {
    const model = await getModel();
    setStatus("🔍 Scanning your photo…");
    if (previewEl.decode) { try { await previewEl.decode(); } catch (_) {} }
    const preds = await model.classify(previewEl, 5);
    handlePredictions(preds);
  } catch (err) {
    setStatus(`<span class="warn">Couldn't run the scanner</span> (${err.message}). You can still tap ingredients below.`);
  }
});

buildGrid();
refreshDatalist();
render();
