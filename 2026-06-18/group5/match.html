<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Match Predictor · 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --text: #f4f3ff; --muted: #a5a3c4;
      --glass: rgba(28, 26, 54, 0.55); --glass-border: rgba(255, 255, 255, 0.10);
      --accent: #b388ff; --accent-2: #5ee7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Inter", system-ui, sans-serif; color: var(--text);
      background: #0a0818; display: flex; justify-content: center; padding: 2rem 1rem 3rem; overflow-x: hidden;
    }
    .mesh {
      position: fixed; inset: -30%; z-index: -1;
      background:
        radial-gradient(40% 40% at 20% 25%, #6d28d9 0%, transparent 60%),
        radial-gradient(35% 35% at 80% 20%, #0ea5e9 0%, transparent 60%),
        radial-gradient(45% 45% at 70% 80%, #db2777 0%, transparent 60%),
        radial-gradient(40% 40% at 25% 85%, #2dd4bf 0%, transparent 60%);
      filter: blur(60px) saturate(140%); opacity: .5; animation: drift 22s ease-in-out infinite alternate;
    }
    @keyframes drift { 0%{transform:translate3d(0,0,0) scale(1);} 100%{transform:translate3d(2%,-3%,0) scale(1.12);} }
    main { width: 100%; max-width: 540px; animation: rise .7s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes rise { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }

    header { margin: 0 0 1.25rem; }
    .eyebrow { font-size: .7rem; letter-spacing: .28em; text-transform: uppercase; color: var(--muted); margin: 0 0 .4rem; }
    h1 {
      font-family: "Space Grotesk", sans-serif; font-size: 1.85rem; font-weight: 700; margin: 0; letter-spacing: -.01em;
      background: linear-gradient(92deg, var(--accent-2), var(--accent) 60%, #ff9ecf);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .nav { margin-top:.6rem; font-size:.8rem; }
    .nav a { color: var(--accent-2); text-decoration: none; }
    .nav a:hover { text-decoration: underline; }

    .card {
      border-radius: 22px; background: var(--glass); border: 1px solid var(--glass-border);
      backdrop-filter: blur(22px) saturate(160%); -webkit-backdrop-filter: blur(22px) saturate(160%);
      box-shadow: 0 24px 60px -20px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.08);
      padding: 1.2rem; margin-bottom: 1.1rem;
    }
    label { display:block; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color: var(--muted); margin:0 0 .35rem; font-weight:600; }
    input, button {
      font-family: inherit; font-size:.95rem; color: var(--text); border-radius: 12px; width:100%;
      border:1px solid var(--glass-border); background: rgba(255,255,255,.05); padding:.7rem .8rem;
    }
    input::placeholder { color: rgba(165,163,196,.6); }
    .row { display:flex; gap:.7rem; }
    .row > div { flex:1; }
    .vs { align-self:flex-end; padding-bottom:.7rem; color: var(--muted); font-family:"Space Grotesk"; font-weight:700; }
    .field { margin-bottom: .9rem; }

    .pick { display:flex; gap:.5rem; }
    .pick button {
      cursor:pointer; font-weight:600; background: rgba(255,255,255,.05); transition: all .15s; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
    }
    .pick button.active { background: linear-gradient(145deg, rgba(179,136,255,.4), rgba(94,231,255,.3)); border-color: rgba(179,136,255,.6); }

    .go { cursor:pointer; font-weight:700; margin-top:.4rem; background: linear-gradient(145deg, rgba(179,136,255,.4), rgba(94,231,255,.3)); }
    .go:hover { filter: brightness(1.15); }

    #result { display:none; text-align:center; }
    #result.show { display:block; animation: rise .5s both; }
    .prob {
      font-family:"Space Grotesk"; font-weight:700; font-size:3.4rem; line-height:1;
      background: linear-gradient(92deg, var(--accent-2), var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent;
    }
    .prob-label { color: var(--muted); font-size:.85rem; margin-top:.4rem; }
    .prob-label b { color: var(--text); }
    .bar { height:10px; border-radius:999px; background: rgba(255,255,255,.08); margin:1.1rem 0 .5rem; overflow:hidden; }
    .bar > span { display:block; height:100%; border-radius:999px; background: linear-gradient(90deg, var(--accent-2), var(--accent)); transition: width .8s cubic-bezier(.2,.8,.2,1); }
    .split { display:flex; justify-content:space-between; font-size:.78rem; color: var(--muted); }
    .verdict { margin-top:1rem; font-size:.85rem; color: var(--muted); }
    .note { font-size:.7rem; color: var(--muted); margin-top:.6rem; }
    footer { text-align:center; font-size:.72rem; color: var(--muted); margin-top:.4rem; }
  </style>
</head>
<body>
  <div class="mesh" aria-hidden="true"></div>
  <main>
    <header>
      <p class="eyebrow">Win Probability</p>
      <h1>Match Predictor</h1>
      <p class="nav"><a href="./index.html">← Project Tree</a> &nbsp;·&nbsp; <a href="./food.html">🍽️ Food</a></p>
    </header>

    <div class="card">
      <div class="row field">
        <div>
          <label>Team A</label>
          <input id="teamA" placeholder="e.g. Argentina" autocomplete="off" />
        </div>
        <div class="vs">vs</div>
        <div>
          <label>Team B</label>
          <input id="teamB" placeholder="e.g. France" autocomplete="off" />
        </div>
      </div>

      <div class="field">
        <label>Who do you think will win?</label>
        <div class="pick" id="pick">
          <button type="button" data-side="A">Team A</button>
          <button type="button" data-side="B">Team B</button>
        </div>
      </div>

      <button type="button" class="go" id="go">Predict probability</button>
      <p class="note" id="err" style="color:#ff9ecf; display:none;"></p>
    </div>

    <div class="card" id="result">
      <div class="prob" id="probValue">—</div>
      <div class="prob-label">chance that <b id="pickedName">—</b> wins</div>
      <div class="bar"><span id="probBar" style="width:0"></span></div>
      <div class="split"><span id="leftPct"></span><span id="rightPct"></span></div>
      <div class="verdict" id="verdict"></div>
      <p class="note" id="ratingNote"></p>
    </div>

    <footer>Probabilities estimated from FIFA ranking points · for fun, not betting advice</footer>
  </main>

  <script>
    // Approximate FIFA ranking points for major national teams (June 2026 ballpark).
    const RATINGS = {
      "argentina":1877, "spain":1875, "france":1870, "england":1820, "portugal":1780,
      "brazil":1776, "netherlands":1750, "belgium":1740, "italy":1720, "germany":1700,
      "croatia":1690, "colombia":1680, "morocco":1675, "mexico":1665, "uruguay":1660,
      "japan":1655, "usa":1650, "united states":1650, "switzerland":1645, "senegal":1640,
      "denmark":1635, "iran":1630, "south korea":1620, "australia":1610, "ecuador":1600,
      "austria":1595, "ukraine":1590, "sweden":1585, "wales":1580, "poland":1575,
      "serbia":1570, "egypt":1560, "nigeria":1555, "canada":1545, "turkey":1540,
      "norway":1535, "scotland":1530, "peru":1525, "chile":1520, "ghana":1500,
      "cameroon":1495, "saudi arabia":1490, "qatar":1480, "india":1130, "china":1280,
    };
    const DEFAULT_RATING = 1500; // unknown teams

    const norm = (s) => s.trim().toLowerCase().replace(/\s+/g, " ");
    const lookup = (name) => {
      const k = norm(name);
      return { rating: RATINGS[k] ?? DEFAULT_RATING, known: k in RATINGS };
    };

    // FIFA expected-result formula: We = 1 / (10^(-dr/600) + 1)
    const expected = (drA) => 1 / (Math.pow(10, -drA / 600) + 1);

    let picked = null;
    const pickButtons = document.querySelectorAll("#pick button");
    pickButtons.forEach(b => b.addEventListener("click", () => {
      picked = b.dataset.side;
      pickButtons.forEach(x => x.classList.toggle("active", x === b));
    }));

    function syncPickLabels() {
      const a = document.getElementById("teamA").value.trim() || "Team A";
      const b = document.getElementById("teamB").value.trim() || "Team B";
      pickButtons[0].textContent = a;
      pickButtons[1].textContent = b;
    }
    document.getElementById("teamA").addEventListener("input", syncPickLabels);
    document.getElementById("teamB").addEventListener("input", syncPickLabels);

    const showErr = (m) => { const e = document.getElementById("err"); e.textContent = m; e.style.display = "block"; };
    const clearErr = () => { document.getElementById("err").style.display = "none"; };

    document.getElementById("go").addEventListener("click", () => {
      clearErr();
      const aName = document.getElementById("teamA").value.trim();
      const bName = document.getElementById("teamB").value.trim();
      if (!aName || !bName) return showErr("Enter both team names.");
      if (!picked) return showErr("Pick which team you think will win.");

      const A = lookup(aName), B = lookup(bName);
      const pAwins = expected(A.rating - B.rating); // prob team A wins
      const pickedIsA = picked === "A";
      const pPicked = pickedIsA ? pAwins : (1 - pAwins);
      const pickedName = pickedIsA ? aName : bName;
      const otherName = pickedIsA ? bName : aName;
      const pct = Math.round(pPicked * 100);

      document.getElementById("probValue").textContent = pct + "%";
      document.getElementById("pickedName").textContent = pickedName;
      document.getElementById("probBar").style.width = pct + "%";
      document.getElementById("leftPct").textContent = `${pickedName} ${pct}%`;
      document.getElementById("rightPct").textContent = `${otherName} ${100 - pct}%`;

      let verdict;
      if (pct >= 70) verdict = `Strong favorite — your pick of ${pickedName} looks solid.`;
      else if (pct >= 55) verdict = `${pickedName} has the edge, but it's not a lock.`;
      else if (pct >= 45) verdict = `Practically a coin flip — could go either way.`;
      else verdict = `Bold call! ${pickedName} is the underdog here — an upset would be impressive.`;
      document.getElementById("verdict").textContent = verdict;

      const notes = [];
      if (!A.known) notes.push(`"${aName}" not in the ratings table — used a baseline of ${DEFAULT_RATING}`);
      if (!B.known) notes.push(`"${bName}" not in the ratings table — used a baseline of ${DEFAULT_RATING}`);
      document.getElementById("ratingNote").textContent = notes.join(" · ");

      document.getElementById("result").classList.add("show");
    });

    syncPickLabels();
  </script>
</body>
</html>
